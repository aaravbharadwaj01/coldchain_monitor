<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cold Chain Monitor - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="/login/login.css">
</head>

<body>

<div class="container-fluid p-0">
<div class="row g-0 vh-100">

<div class="col-lg-4 left-panel d-none d-lg-flex">

<div class="left-content">

<div class="logo-area">
<i class="fa-solid fa-snowflake"></i>

<div>
<h2>ColdChain</h2>
<span>MONITOR</span>
</div>
</div>

<h1>Smart Monitoring for Every Cold Delivery</h1>

<p>
Real-time temperature & humidity monitoring for dairy transport vehicles.
</p>

<img src="../assets/images/truck.png" class="truck" alt="Truck">

</div>

</div>

<div class="col-lg-8 col-12 right-panel">

<div class="login-box">

<h1>Welcome Back!</h1>

<p class="sub-title">Login to your account</p>

<form id="loginForm">

<div class="mb-4">
<label>Email</label>
<input type="text" id="username" class="form-control" placeholder="Enter your email">
</div>

<div class="mb-4">

<label>Password</label>

<div class="password-box">

<input type="password" id="password" class="form-control" placeholder="Enter your password">

<i id="togglePassword" class="fa-solid fa-eye"></i>

</div>

</div>

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<input type="checkbox" id="remember">

<label for="remember">Remember me</label>

</div>

<a href="#" id="forgotPassword">Forgot Password?</a>

</div>

<button class="btn login-btn" id="loginBtn" type="submit">
Login
</button>

<div id="message" class="message"></div>

</form>

<div class="signup">
Don't have an account?
<a href="#">Sign Up</a>
</div>

</div>

</div>

</div>
</div>

<script src="login.js"></script>

</body>
</html>
