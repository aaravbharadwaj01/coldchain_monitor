<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h1>Alerts</h1>
    <div class="top-right">
      <div class="bell-wrap" id="bellToggle">
        <div class="bell">🔔<span class="dot" id="bellDot"></span></div>
        <div class="bell-dropdown" id="bellDropdown">
          <div class="bell-dropdown-header">Recent Alerts</div>
          <div class="bell-list" id="bellList"></div>
          <a href="alerts.html" class="bell-view-all">View all alerts</a>
        </div>
      </div>
      <div class="profile" id="profileToggle">
        <div class="avatar">A</div>
        <span class="name">Admin</span>
        <span class="chev">▾</span>
        <div class="profile-dropdown" id="profileDropdown">
          <a href="../profile/profile.html" class="dropdown-item">👤 My Profile</a>
          <a href="../settings/settings.html" class="dropdown-item">⚙️ Settings</a>
          <div class="dropdown-divider"></div>
          <a href="#" class="dropdown-item logout-item">⎋ Logout</a>
        </div>
      </div>
    </div>
  </div>

  <div class="content">

    <div class="filter-bar">
      <select class="filter-select" id="alertVehicleFilter">
        <option>All Vehicles</option>
        <option>RJ14 AB 4587</option>
        <option>DL1L AB 1234</option>
      </select>
      <select class="filter-select" id="alertTypeFilter">
        <option>All Types</option>
        <option>Temperature High</option>
        <option>Temperature Low</option>
        <option>Humidity High</option>
        <option>Sensor Offline</option>
        <option>Door Open</option>
      </select>
      <select class="filter-select" id="alertStatusFilter">
        <option>All Status</option>
        <option>Active</option>
        <option>Resolved</option>
      </select>
      <input type="date" class="filter-select" id="alertDateFilter" value="2026-07-24">
      
        
      </select>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Vehicle</th>
            <th>Alert Type</th>
            <th>Message</th>
            <th>Severity</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="alertsTableBody">
         
        </tbody>
      </table>
    </div>

  </div>
</div>

<script src="../assets/js/mockData.js"></script>
<script src="../assets/js/dashboard.js"></script>


<script>

async function loadAlerts(){

    try{

        const response = await fetch(
            "http://localhost:6060/api/alerts"
        );


        const alerts = await response.json();


        const tbody = document.getElementById(
            "alertsTableBody"
        );


        tbody.innerHTML="";


        alerts.forEach(alert=>{


            tbody.innerHTML += `

            <tr>

            <td class="cell-muted">
            ${new Date(alert.time).toLocaleString()}
            </td>


            <td class="cell-strong">
            ${alert.vehicle}
            </td>


            <td>
            ${alert.type}
            </td>


            <td class="cell-muted">
            ${alert.message}
            </td>


            <td>
            <span class="pill ${alert.severity.toLowerCase()}">
            ${alert.severity}
            </span>
            </td>


            <td>
            <span class="pill ${alert.status.toLowerCase()}">
            ${alert.status}
            </span>
            </td>


            </tr>

            `;


        });


    }

    catch(error){

        console.error(
            "Alert loading error:",
            error
        );

    }

}



loadAlerts();


// refresh every 5 seconds
setInterval(loadAlerts,5000);


</script>
